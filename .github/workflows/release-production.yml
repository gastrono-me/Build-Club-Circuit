name: release production

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Tested commit SHA from main"
        required: true

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      SUPABASE_DB_URL: ${{ secrets.PRODUCTION_SUPABASE_DB_URL }}
      EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - name: Require a commit already on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
      - name: Pull production application configuration
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build the exact release commit
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Migrate production before application traffic changes
        run: npm run db:migrate
      - name: Deploy prebuilt release
        id: deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
      - name: Health smoke
        run: |
          DEPLOYMENT_URL=$(tail -n 1 deployment-url.txt)
          curl --fail --retry 5 --retry-delay 3 "$DEPLOYMENT_URL/api/health"
