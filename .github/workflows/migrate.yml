name: migrate

# Apply DB migrations automatically when they change on main, so a schema
# change goes live from the same git push that deploys the code (Vercel builds
# the app in parallel). Additive migrations are ready in seconds, well before
# the build serves traffic. Requires the SUPABASE_DB_URL repo secret.
#
# One-time bootstrap for a database that already had migrations applied by hand:
# run this workflow manually (Actions -> migrate -> Run workflow) with the
# `baseline` input set to the highest already-applied number (e.g. 013). That
# records history without touching the schema; afterwards every push applies
# only new migrations.

on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"
      - "scripts/migrate.mjs"
      - ".github/workflows/migrate.yml"
  workflow_dispatch:
    inputs:
      baseline:
        description: "One-time: record migrations 001..N as applied without running them (e.g. 013). Leave blank for a normal apply."
        required: false
        default: ""

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Apply migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BASELINE: ${{ github.event.inputs.baseline }}
        run: |
          if [ -n "$BASELINE" ]; then
            node scripts/migrate.mjs baseline "$BASELINE"
          else
            node scripts/migrate.mjs
          fi
