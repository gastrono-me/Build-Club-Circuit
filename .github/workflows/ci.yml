name: verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nonprod-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_URL: ${{ vars.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ vars.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_PROJECT_REF: ${{ vars.E2E_SUPABASE_PROJECT_REF }}
      E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_BUILDER_EMAIL: ${{ vars.E2E_BUILDER_EMAIL }}
      E2E_BUILDER_PASSWORD: ${{ secrets.E2E_BUILDER_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      EXPECTED_SUPABASE_PROJECT_REF: ${{ vars.E2E_SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production dependency policy
        run: npm audit --omit=dev --audit-level=high
      - name: Migrate designated non-production database
        run: npm run db:migrate
      - name: Production build
        run: npm run build
      - name: Install E2E browser
        run: npx playwright install --with-deps chromium
      - name: Non-production E2E
        run: npm run e2e
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/playwright/
          if-no-files-found: ignore
          retention-days: 7
